name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version name, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: syncthingMem0
  MAIN_PACKAGE: ./cmd/syncthing
  CGO_ENABLED: "0"

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project
        shell: bash
        run: |
          test -f go.mod || {
            echo "Release requires a root go.mod file."
            exit 1
          }

          test -d "${MAIN_PACKAGE#./}" || {
            echo "Release requires MAIN_PACKAGE=$MAIN_PACKAGE."
            exit 1
          }

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        shell: bash
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist package
          suffix=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            suffix=".exe"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
            -ldflags="-s -w" \
            -o "package/${BINARY_NAME}${suffix}" \
            "$MAIN_PACKAGE"

      - name: Package
        shell: bash
        run: |
          artifact="${BINARY_NAME}_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd package && zip -r "../dist/${artifact}.zip" .)
          else
            tar -czf "dist/${artifact}.tar.gz" -C package .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, '-rc.') || contains(steps.version.outputs.version, '-beta.') || contains(steps.version.outputs.version, '-alpha.') }}
          files: dist/*
