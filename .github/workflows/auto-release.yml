name: Auto Release

# Push lên main -> tự động:
#   SERVER : build Docker image đa kiến trúc (amd64/arm64) đẩy lên GHCR  -> release server-vX
#   CLIENT : build bản cài tự cấu hình cho Windows/macOS/Linux           -> release client-vX
# Server và client KHÔNG còn chung 1 output: server là image để deploy,
# client là gói cài (binary + script tự sinh config trỏ về hub).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # tạo tag + release
  packages: write # đẩy image lên GHCR

env:
  CGO_ENABLED: "0"
  IMAGE: ghcr.io/vanbienperu3107/syncthingmem0-server
  # Số phiên bản gốc — đổi ở DUY NHẤT chỗ này. github.run_number là số build.
  VERSION: "0.1.0"

jobs:
  # ===========================================================================
  # VERIFY — cổng kiểm thử: KHÔNG phát hành nếu format/vet/test đỏ
  # ===========================================================================
  verify:
    name: Verify (fmt / vet / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Kiểm tra gofmt
        shell: bash
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Các file chưa đạt gofmt:"; echo "$files"; exit 1
          fi
      # Sinh GUI assets sau bước gofmt (file sinh ra không cần đạt gofmt)
      - name: Generate GUI assets
        run: go generate ./lib/api/auto
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  # ===========================================================================
  # CLIENT — bản cài cho máy người dùng
  # ===========================================================================
  build-client:
    name: Build client ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate GUI assets
        run: go generate ./lib/api/auto
      - name: Build + đóng gói bản cài client
        shell: bash
        run: |
          set -euo pipefail
          bin="syncthing"; [ "${{ matrix.goos }}" = "windows" ] && bin="syncthing.exe"
          pkg="syncthingMem0-client-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "stage/$pkg" dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" -o "stage/$pkg/$bin" ./cmd/syncthing
          cp packaging/client/README.md "stage/$pkg/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp packaging/client/install.ps1 "stage/$pkg/"
            (cd stage && zip -r "../dist/$pkg.zip" "$pkg")
          else
            cp packaging/client/install.sh "stage/$pkg/"
            chmod +x "stage/$pkg/install.sh"
            tar -czf "dist/$pkg.tar.gz" -C stage "$pkg"
          fi
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release-client:
    name: Publish CLIENT release
    needs: build-client
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: client-*
          path: artifacts
          merge-multiple: true
      - run: ls -laR artifacts
      - id: ver
        run: echo "tag=client-v${{ env.VERSION }}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: syncthingMem0 CLIENT ${{ steps.ver.outputs.tag }}
          body: |
            **Bản CLIENT** — bản cài tự tạo cấu hình cho máy cá nhân.
            Giải nén, chạy `install.sh` (Linux/macOS) hoặc `install.ps1` (Windows);
            trình cài tự sinh khóa + config trỏ về hub (WSS:443). Xem README trong gói.
            Build từ commit ${{ github.sha }}.
          generate_release_notes: true
          files: artifacts/**/*

  # ===========================================================================
  # SERVER — Docker image cho hub trên VPS
  # ===========================================================================
  build-server-image:
    name: Build & push SERVER image (GHCR)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate GUI assets
        run: go generate ./lib/api/auto
      - name: Cross-compile binary linux cho image (amd64, arm64)
        shell: bash
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build -trimpath -ldflags="-s -w" \
              -o "syncthing-linux-$arch" ./cmd/syncthing
          done
          ls -la syncthing-linux-*
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ver
        run: echo "tag=v${{ env.VERSION }}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}

  release-server:
    name: Publish SERVER release
    needs: build-server-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - id: ver
        run: echo "tag=server-v${{ env.VERSION }}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: syncthingMem0 SERVER ${{ steps.ver.outputs.tag }}
          body: |
            **Bản SERVER (hub)** — Docker image đa kiến trúc cho VPS.

            ```
            docker pull ${{ env.IMAGE }}:v${{ env.VERSION }}-build.${{ github.run_number }}
            # hoặc: docker pull ${{ env.IMAGE }}:latest
            ```
            Deploy nhanh bằng `deploy/server/docker-compose.yml` (đính kèm).
            Nhớ đặt `HubSecret` (>=32 ký tự) trong config trước khi dùng thật.
            Đăng ký thiết bị fail-closed: phải đặt `RegistrationSecret`, nếu để trống
            thì `/api/register` luôn trả 403 (không mở đăng ký cho bất kỳ ai).
            Build từ commit ${{ github.sha }}.
          files: deploy/server/docker-compose.yml
