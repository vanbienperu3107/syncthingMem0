name: Feature CI

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Prepare generated assets
        run: go run build.go

      - name: Run feature tests
        run: go test ./lib/auth/... ./lib/api/... ./lib/config/... -count=1

      - name: Build Syncthing
        run: go run build.go -no-upgrade

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: syncthing-${{ github.run_id }}
          path: bin/syncthing*
          if-no-files-found: error
