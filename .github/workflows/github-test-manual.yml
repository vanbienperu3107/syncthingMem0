name: Manual GitHub Test

on:
  workflow_dispatch:

jobs:
  test:
    name: Run Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build client assets
        run: go run build.go assets

      - name: Run tests
        run: go test ./...
