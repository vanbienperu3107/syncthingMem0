name: Build client & server

# Bỏ trigger "push" để không chạy trùng với auto-release.yml trên main.
# Workflow này dùng để build client/server và đính kèm khi publish release thủ công.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  client:
    name: Build client assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build client assets
        run: |
          go run build.go assets
          tar -czf client-assets-${{ github.sha }}.tar.gz \
            lib/api/auto/gui.files.go \

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-assets
          path: client-assets-${{ github.sha }}.tar.gz

  server:
    name: Build server binary
    needs:
      - client
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            ext: ""
            goos: linux
          - os: windows
            ext: ".exe"
            goos: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server for ${{ matrix.os }}
        run: |
          CGO_ENABLED=0 go run build.go -goos=${{ matrix.goos }} -goarch=amd64 build syncthing
          tar -czf server-${{ matrix.os }}-amd64-${{ github.sha }}.tar.gz syncthing${{ matrix.ext }}

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.os }}-amd64
          path: server-${{ matrix.os }}-amd64-${{ github.sha }}.tar.gz

  publish-release:
    name: Đẩy build lên GitHub Release
    if: github.event_name == 'release'
    needs:
      - client
      - server
    runs-on: ubuntu-latest
    steps:
      - name: Download client artifact
        uses: actions/download-artifact@v7
        with:
          name: client-assets
          path: artifacts/client

      - name: Download server artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: server-*
          path: artifacts/server
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/client/client-assets-${{ github.sha }}.tar.gz
            artifacts/server/*.tar.gz
